name: Scheduled publish

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add scheduled columns
        run: node scripts/scheduled-publish.mjs

      - name: Generate column pages and sitemap
        run: node scripts/generate-columns.mjs

      - name: Commit published columns
        id: commit
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/columns.json column sitemap.xml
          git commit -m "Publish scheduled columns"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment
        if: steps.commit.outputs.changed == 'true'
        run: sleep 90

      - name: Submit sitemap to search engines
        if: steps.commit.outputs.changed == 'true'
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: node scripts/submit-search-engines.mjs
